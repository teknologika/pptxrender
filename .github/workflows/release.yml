# .github/workflows/release.yml
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Add macOS targets
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Build (arm64)
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build (x86_64)
        run: cargo build --release --target x86_64-apple-darwin

      - name: Create universal binary
        run: |
          mkdir -p dist
          lipo -create \
            target/aarch64-apple-darwin/release/pptxrender \
            target/x86_64-apple-darwin/release/pptxrender \
            -output dist/pptxrender
          chmod +x dist/pptxrender

      - name: Package
        run: |
          cd dist
          tar -czf pptxrender-macos-universal.tar.gz pptxrender
          shasum -a 256 pptxrender-macos-universal.tar.gz > pptxrender-macos-universal.tar.gz.sha256

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/pptxrender-macos-universal.tar.gz
            dist/pptxrender-macos-universal.tar.gz.sha256